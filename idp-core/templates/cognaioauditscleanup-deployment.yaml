apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.cognaioauditscleanup.name }}
  labels:
    {{- include "cognaio.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      name: {{ .Values.cognaioauditscleanup.name }}
      {{- include "cognaio.selectorLabels" . | nindent 6 }}
  replicas: {{ .Values.cognaioauditscleanup.replicaCount }}
  template:
    metadata:
      labels:
        name: {{ .Values.cognaioauditscleanup.name }}
        appgroup: cognaio-idp
        {{- include "cognaio.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 6 }}
      {{- end }}
      containers:
      - name: {{ .Values.cognaioauditscleanup.name }}
        image: {{ .Values.image.containerRegistry }}/{{ .Values.cognaioauditscleanup.image.name }}:{{ .Values.cognaioauditscleanup.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
           {{- toYaml .Values.securityContext | nindent 10 }}
        ports:
        - containerPort: {{ .Values.cognaioauditscleanup.env.port }}
        env:
        - name: PORT
          value: {{ .Values.cognaioauditscleanup.env.port | quote }}
        - name: NODE_ENV
          value: {{ .Values.cognaioauditscleanup.env.node_env }} 
        {{- if .Values.cognaioauditscleanup.env.extra_ca_certs }}
        - name: NODE_EXTRA_CA_CERTS
          value: {{ .Values.cognaioauditscleanup.env.extra_ca_certs }}
        {{- end }}
        - name: PostgreSql_User
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cognaioauditscleanup.env.secret.name }}
              key: postgreSqlUser
        - name: PostgreSql_Pwd
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cognaioauditscleanup.env.secret.name }}
              key: postgreSqlPwd
        - name: PostgreSql_Db_Server
          value: {{ .Values.cognaioauditscleanup.env.db.postgreSqlDbServer }}:{{ .Values.cognaioauditscleanup.env.db.postgreSqlDbPort }}
        - name: PostgreSql_Schemas
          value: {{ .Values.cognaioauditscleanup.env.db.schemas }}
        - name: PostgreSql_Db_Name
          value: {{ .Values.cognaioauditscleanup.env.db.postgreSqlDbName | quote }} 
        - name: PostgreSql_Ssl_Required
          value: {{ .Values.cognaioauditscleanup.env.db.postgreSqlSslRequired | quote }} 
        - name: LogSeverity
          value: {{ .Values.cognaioauditscleanup.env.logSeverity }} 
        {{- if .Values.cognaioauditscleanup.resources }}
        resources: {{- toYaml .Values.cognaioauditscleanup.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.cognaioauditscleanup.volumeMounts }}
        volumeMounts:
          {{ tpl .Values.cognaioauditscleanup.volumeMounts . | nindent 10 }}
        {{- end}}
      {{- if .Values.cognaioauditscleanup.volumes }}
      volumes:
        {{ tpl .Values.cognaioauditscleanup.volumes . | nindent 8 }}
      {{- end}}