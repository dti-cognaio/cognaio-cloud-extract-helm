# ---------------------------------------------------------------------------
# redis
# ---------------------------------------------------------------------------
redis:
  additionalVolumeMounts:
    - mountPath: /data
      name: cache-volume
  additionalVolumes:
    - name: cache-volume
      emptyDir: {}
