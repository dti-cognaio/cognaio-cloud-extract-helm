cognaioservice:
  name: cognaioservice
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  podLabels:
    app.kubernetes.io/part-of: cce-core
  podSelectorLabels:
    app.kubernetes.io/component: cognaioservice
  serviceAccount:
    create: false
    annotations: {}
    name: "default"
    automount: false
  podSecurityContext: {}
  securityContext: {}
  init:
    image:
      name: dti/idp/cognaioschemamanager
      tag: 3.0.0
    securityContext: {}
    resources:
      limits:
        memory: "512Mi"
      requests:
        memory: "256Mi"
        cpu: "100m"
    additionalVolumeMounts: []
    #   - mountPath: /app/tmp
    #     name: cache-volume
    additionalVolumes: []
    #   - name: cache-volume
    #     emptyDir: {}
    extraEnv: []
    # - name: MY_EXTRA_VAR
    #   value: "my-value"
    # - name: MY_SECRET_VAR
    #   valueFrom:
    #     secretKeyRef:
    #       name: my-secret
    #       key: my-key
  image:
    name: dti/idp/cognaioservice
    tag: 3.0.0
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    name: cognaioservice
    port: 80
    type: ClusterIP
    urlpath: /extraction/api
  env:
    port: 3000
    # extra_ca_certs: /app/ca-certificates.crt
    secret:
      name: cognaioservice-env-secrets
      init: true
    db:
      dbCheckExistence: true
      postgreSqlUser: ""
      postgreSqlPwd: ""
      postgreSqlDbServer: ""
      postgreSqlDbPort: 5432
      postgreSqlSslRequired: true
      postgreSqlDbName: "cognaio_idp"
      schemas:
        - cognaio_extensions
        - cognaio_design
        - cognaio_audits
      postgreSqlAuthMode: "basic" # any other mode than entra would lead to standard username/password usage
    tokens:
      passPhraseAuditArtifacts: ""
      passPhraseDefinitions: ""
      passPhraseTemplates: ""
      passPhraseCryptoAsymetric: ""
      passPhraseCryptoSymetric: ""
      tokenEncryptionTokenJwtKey: ""
      passPhraseAccessTokenJwtKey: ""
      passPhraseRefreshTokenJwtKey: ""
      passPhraseUnsubscribeTokenJwtKey: ""
      passPhraseExportTokenJwtKey: ""
      passPhraseMailboxesTokenJwtKey: ""
      passPhraseEnvelopesTokenJwtKey: ""
      passPhraseRegisterTokenJwtKey: ""
      passPhraseOtpTokenJwtKey: ""
      passPhraseAppKeyJwtKey: ""
      passPhraseCryptoSymetricAppKey: ""
      passPhraseAnalyzeFromContentJwtKey: ""
      passPhraseAnalyzeResponseDownloadJwtKey: ""
    ai:
      apikeyAzureOpenAi: ""
      apikeyNativeOpenAi: ""
      apikeyAiFoundry: ""
      apikeyAzureAiDocumentIntelligence: ""
      apikeyAzureCognitiveServicesComputervision: ""
      endpointAzureOpenAi: ""
      endpointNativeOpenAi: ""
      endpointAiFoundry: ""
      endpointAzureAiDocumentIntelligence: ""
      endpointAzureCognitiveServicesComputerVision: ""
      apikeyNativeGemini: ""
      apikeyNativeAnthropic: ""
      apikeyNativeCerebral: ""
      endpointNativeCerebral: ""
    aws:
      accesskeyIdAwsTextract: ""
      secretAccessKeyAwsTextract: ""
      regionAwsTextract: ""
      accesskeyIdAwsBedrock: ""
      secretAccessKeyAwsBedrock: ""
      regionAwsBedrock: ""
    mailAccount:
      user: ""
      password: ""
      host: "smtp.office365.com"
      port: 587
      fromAddressFriendlyName: "Cognaio"
      useAdvancedAuth: false
      advancedAuth:
        auth:
          user: "yourEmailAddress"
          pass: "yourPassword"
      useCustomSettings: false
      customSettings:
        secure: false
        maxConnections: 150
        tls:
          ciphers: "SSLv3"
          rejectUnauthorized: false
      notificationProvider: "smtp" # any other provider than 'graph' would lead to standard SMTP usage
    organization:
      users:
        - "email_1@example.com"
        - "email_2@example.com"
    cognitiveServices:
      computervision:
        maxRequestTimeoutInSec: 6
        maxRetries: 30
        maxRetriesWaitTimeoutInSec: 1
        maxWaitTimeoutForFinishedInSec: 1
      aiDocumentIntelligence:
        maxRequestTimeoutInSec: 60
        maxRetries: 30
        maxRetriesWaitTimeoutInSec: 3
      awsTextract:
        maxRequestTimeoutInSec: 60
        maxRetries: 30
        maxRetriesWaitTimeoutInSec: 3
    openID:
      passPhraseUserInfo: ""
      passPhraseOidcSecrets: ""
      microsoftDisabled: true
      microsoftClientId: ""
      microsoftClientSecret: ""
      microsoftTenant: "common"
      microsoftTenantsExpected: ""
      microsoftLayoutOrder: 1
      googleDisabled: true
      googleClientId: ""
      googleClientSecret: ""
      googleTenantsExpected: ""
      googleLayoutOrder: 2
      githubDisabled: true
      githubClientId: ""
      githubClientSecret: ""
      githubTenantsExpected: ""
      githubLayoutOrder: 3
      oidcProviderTypesDisabled: ""
    essentials:
      warningNotificationTimeoutInHours: 48
      featureExceedsLimitsNotificationTimeoutInDays: 2
      endpointsPrivateKey: ""
      endpointsPublicKey: ""
    feature:
      cerebralEdgeDisabled: false
      awsServicesDisabled: true
      appKeyUsageDisabled: false
      pageRetentionDisabled: false
      llmTemplatesSyncDisabled: false
      endpointsManageDisabled: false
      viewPlatformAuditsDisabled: false
    environmentNameForNotifications: "COGNAiO IDP"
    otpDisabled: false
    serviceAccountPermissionsToExclude: "{}"
    nonAdministrationLayerPermissionsToExclude: "{}"
    logSeverity: "info"
  extraEnv: []
  # - name: MY_EXTRA_VAR
  #   value: "my-value"
  # - name: MY_SECRET_VAR
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: my-key
  extraContainers: []
  # - name: authentication-proxy
  #   image: myregistry/auth-proxy:1.0.0
  #   ports:
  #     - containerPort: 8081
  #   env:
  #     - name: UPSTREAM
  #       value: "http://localhost:3000"
  livenessProbe:
    tcpSocket:
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
    tcpSocket:
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10
  lifecycle: {}
    # preStop:
    #   exec:
    #     command: ["/bin/sh", "-c", "sleep 10"]
  resources:
    limits:
      memory: "1Gi"
    requests:
      memory: "512Mi"
      cpu: "200m"
  additionalVolumeMounts: []
  #   - mountPath: /app
  #     name: extra-ca-cert
  additionalVolumes: []
  #   - name: extra-ca-cert
  #     emptyDir: {}

