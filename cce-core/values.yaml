  # readOnlyRootFilesystem: true
  # capabilities:
  #   drop: ["ALL"]

annotations: {}
labels: {}

image:
  pullPolicy: Always
  containerRegistry: "dtideregistry.azurecr.io"
  restartPolicy: "Always"

# COGNAiO specific values
cognaio:
  namespace: cognaio-idp
  url: ""
  protocol: "https"
  wildcardUrl: ""
  cert:
    certificate: ""
    key: "" 
    secret:
      name: cognaio-com-tls-secret
      init: true
  ingress:
    enabled: true

