  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    name: nginx
    port: 80
    type: ClusterIP
    additionalAnnotations: {}
  env:
    port: 8080
  livenessProbe:
    tcpSocket:
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
