{{- if .Values.cognaioservice.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.cognaioservice.serviceAccount.name }}
  labels:
    {{- include "cognaio.labels" . | nindent 4 }}
  {{- with .Values.cognaioservice.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.cognaioservice.serviceAccount.automount }}
{{- end }}
