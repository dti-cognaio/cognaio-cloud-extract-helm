{{- if .Values.cognaioinsightagentic.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.cognaioinsightagentic.serviceAccount.name }}
  labels:
    {{- include "vinna.labels" . | nindent 4 }}
  {{- with .Values.cognaioinsightagentic.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.cognaioinsightagentic.serviceAccount.automount }}
{{- end }}
