suite: Test Volume and VolumeMounts
tests:
  - it: should render volumes and volumeMounts for cognaioservice init container and main container
    template: cognaio-service/deployment.yaml
    set:
      cognaioservice:
        additionalVolumes:
          - name: volume-1-main
            emptyDir: {}
        additionalVolumeMounts:
          - mountPath: /app/tmp
            name: volume-1-main
        init:
          additionalVolumes:
            - name: volume-1-init
              emptyDir: {}
          additionalVolumeMounts:
            - mountPath: /app/tmp
              name: volume-1-init
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: volume-1-main
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /app/tmp
            name: volume-1-main
      - contains:
          path: spec.template.spec.volumes
          content:
            name: volume-1-init
            emptyDir: {}
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            mountPath: /app/tmp
            name: volume-1-init

