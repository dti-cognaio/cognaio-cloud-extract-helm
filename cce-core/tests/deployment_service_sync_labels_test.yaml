suite: Test Label Synchronization
templates:
  - cognaio-service/deployment.yaml
  - cognaio-service/service.yaml
release:
  name: cce-release
  namespace: cce
tests:
  - it: should match Deployment selector with Service selector
    set:
      cognaioservice:
        name: my-app
        service:
          name: my-app-svc
        podSelectorLabels:
          app.kubernetes.io/component: cognaioservice
        podLabels:
          app.kubernetes.io/part-of: cce-core
    asserts:
      # Wir holen den Selector aus dem Service und vergleichen ihn 
      # mit dem Selector aus dem Deployment.
      - equal:
          path: spec.selector
          value:
            app.kubernetes.io/name: cognaio-cloud-extract
            app.kubernetes.io/instance: cce-release
            app.kubernetes.io/component: cognaioservice
        template: cognaio-service/service.yaml

      - equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/name: cognaio-cloud-extract
            app.kubernetes.io/instance: cce-release
            app.kubernetes.io/component: cognaioservice
        template: cognaio-service/deployment.yaml

  - it: should ensure Pod labels contain all Selector labels
    set:
      cognaioservice:
        podSelectorLabels:
          app.kubernetes.io/component: cognaioservice
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: cognaioservice
        template: cognaio-service/deployment.yaml
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: cce-release
        template: cognaio-service/deployment.yaml

  - it: should have organizational podLabels only in metadata and template
    set:
      cognaioservice:
        name: my-app
        service:
          name: my-app-svc
        podSelectorLabels:
          app.kubernetes.io/component: cognaioservice
        podLabels:
          app.kubernetes.io/part-of: cce-core
    asserts:
      - notExists:
          path: spec.selector.matchLabels["app.kubernetes.io/part-of"]
        template: cognaio-service/deployment.yaml
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/part-of"]
          value: cce-core
        template: cognaio-service/deployment.yaml