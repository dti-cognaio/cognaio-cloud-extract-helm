suite: ServiceAccount Tests
release:
  name: cce-unittests
templates:
  - "**/serviceaccount.yaml"
tests:
  - it: should not render any ServiceAccount when create is false
    set:
      cognaioservice:
        serviceAccount:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render cognaioservice ServiceAccount with correct name
    template: templates/cognaio-service/serviceaccount.yaml
    set:
      cognaioservice:
        serviceAccount:
          create: true
          name: "my-service-account"
          automount: false
          annotations: {}
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: my-service-account
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should render nginx ServiceAccount with correct name
    template: templates/nginx/serviceaccount.yaml
    set:
      nginx:
        serviceAccount:
          create: true
          name: "nginx-sa"
          automount: true
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::role/nginx"
    asserts:
      - equal:
          path: metadata.name
          value: nginx-sa
      - equal:
          path: automountServiceAccountToken
          value: true
      - isSubset:
          path: metadata.annotations
          content:
            eks.amazonaws.com/role-arn: "arn:aws:iam::role/nginx"

  - it: should use serviceAccount.name not annotations for metadata.name
    template: templates/cognaio-email-service/serviceaccount.yaml
    set:
      emailservice:
        serviceAccount:
          create: true
          name: "email-sa"
          automount: false
          annotations:
            some-annotation: "some-value"
    asserts:
      - equal:
          path: metadata.name
          value: email-sa

  - it: should render redis ServiceAccount correctly
    template: templates/redis/serviceaccount.yaml
    set:
      redis:
        serviceAccount:
          create: true
          name: "redis-sa"
          automount: false
          annotations: {}
    asserts:
      - equal:
          path: metadata.name
          value: redis-sa

  - it: should not render annotations when empty
    template: templates/cognaio-flexsearch/serviceaccount.yaml
    set:
      cognaioflexsearchservice:
        serviceAccount:
          create: true
          name: "flexsearch-sa"
          automount: false
          annotations: {}
    asserts:
      - equal:
          path: metadata.name
          value: flexsearch-sa
      - notExists:
          path: metadata.annotations
