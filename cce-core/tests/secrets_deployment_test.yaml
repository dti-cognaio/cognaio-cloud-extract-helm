suite: Global Logic Checks
templates:
  - "**/secrets.yaml"
tests:
  - it: should not render any secrets when secrets.init is false
    set:
      cognaio.cert.secret.init: false
      redis.secret.init: false
      cognaioservice.env.secret.init: false
      emailservice.env.secret.init: false
      cognaioflexsearchservice.env.secret.init: false
      cognaioauditscleanup.env.secret.init: false
    asserts:
      - hasDocuments:
          count: 0 
  - it: should render any secrets when secrets.init is true
    set:
      cognaio.cert.secret.init: true
      redis.secret.init: true
      cognaioservice.env.secret.init: true
      emailservice.env.secret.init: true
      cognaioflexsearchservice.env.secret.init: true
      cognaioauditscleanup.env.secret.init: true
    asserts:
      - hasDocuments:
          count: 1 