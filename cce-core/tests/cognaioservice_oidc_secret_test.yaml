suite: Test cognaioservice OIDC secrets passphrase
templates:
  - "cognaio-service/secrets.yaml"
tests:
  - it: should render the mandatory openIDPassPhraseOidcSecrets key (base64)
    set:
      cognaioservice.env.openID.passPhraseOidcSecrets: "oidc-test-pass"
    asserts:
      - equal:
          path: data.openIDPassPhraseOidcSecrets
          value: "b2lkYy10ZXN0LXBhc3M="
  - it: should still render the key (empty) when no passphrase is provided
    asserts:
      - exists:
          path: data.openIDPassPhraseOidcSecrets
