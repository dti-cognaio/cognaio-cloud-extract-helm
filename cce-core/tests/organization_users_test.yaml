suite: Test organization users rendering
templates:
  - "cognaio-service/deployment.yaml"
tests:
  - it: should generate correct organization users string
    set:
      cognaioservice.env.organization.users:
        - "email_1@example.com"
        - "email_2@example.com"
        - "email_3@example.com"
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: COGNAIOENVIRONMENTVARIABLES__ORGANIZATIONUSERS
            value: "'email_1@example.com','email_2@example.com','email_3@example.com'"